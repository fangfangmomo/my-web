<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pac-Man 吃单词 | 单元选择 · 随机顺序 · 鼓励语音</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a6b8f 0%, #03506f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* 开始选择界面覆盖层 */
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }
        .start-panel {
            background: linear-gradient(145deg, #ffefcf, #ffdfb5);
            border-radius: 80px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.8);
            border: 4px solid #ffcc77;
            max-width: 90%;
            width: 500px;
        }
        .start-panel h1 {
            font-size: 3rem;
            margin: 0 0 15px;
            color: #b95f1a;
            text-shadow: 3px 3px 0 #ffdd99;
        }
        .start-panel p {
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #7a4a1a;
        }
        .unit-buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .unit-btn {
            background: #ffbb77;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 60px;
            color: #3e2a1f;
            cursor: pointer;
            box-shadow: 0 8px 0 #a5651e;
            transition: 0.05s linear;
            font-family: inherit;
            min-width: 180px;
        }
        .unit-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #a5651e;
        }
        .unit-btn.mon-fri { background: #ffaa66; }
        .unit-btn.thu { background: #88ccff; color: #2c3e2f; box-shadow: 0 8px 0 #5a7c9e; }

        .game-container {
            background: #c1e4f7;
            border-radius: 72px;
            padding: 25px 20px 30px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), inset 0 1px 4px rgba(255, 255, 200, 0.8);
            max-width: 1100px;
            width: 100%;
            border: 3px solid #ffdf9c;
        }

        .score-area {
            background: #fff0c0;
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: inset 0 0 0 2px #fff8e0, 0 5px 0 #c29b4a;
        }
        .score-title {
            font-size: 24px;
            font-weight: bold;
            color: #b95f1a;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .fish-collection {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .fish-badge {
            font-size: 36px;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
            transition: all 0.2s ease;
            opacity: 0.6;
        }
        .fish-badge.collected {
            opacity: 1;
            filter: drop-shadow(0 0 6px gold);
            animation: fishGlow 0.5s ease-out;
        }
        @keyframes fishGlow {
            0% { transform: scale(0.8); opacity: 0; text-shadow: 0 0 0 gold; }
            50% { transform: scale(1.3); text-shadow: 0 0 12px gold; }
            100% { transform: scale(1); opacity: 1; text-shadow: 0 0 4px gold; }
        }
        .score-counter {
            background: #ff8c42;
            border-radius: 40px;
            padding: 8px 18px;
            color: white;
            font-weight: bold;
            font-size: 24px;
            text-shadow: 1px 1px 0 #b95f1a;
        }

        .monster-area {
            background: #9ed9f0;
            border-radius: 60px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: inset 0 0 0 3px #fff3cf, 0 8px 12px rgba(0,0,0,0.2);
        }

        .fish-emoji {
            font-size: 90px;
            filter: drop-shadow(4px 8px 12px rgba(0,0,0,0.3));
            transition: transform 0.1s ease;
            display: inline-block;
            cursor: pointer;
        }

        .hint-area {
            background: #fff0da;
            border-radius: 60px;
            padding: 15px 20px;
            margin: 15px auto;
            display: inline-block;
            width: 90%;
        }

        .chinese-meaning {
            font-size: 42px;
            font-weight: bold;
            color: #ff8c42;
            background: #ffefcf;
            display: inline-block;
            padding: 8px 28px;
            border-radius: 60px;
            box-shadow: inset 0 0 0 2px #ffd58c, 0 5px 0 #c29b4a;
            letter-spacing: 4px;
        }

        .speaker-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffbb77;
            border-radius: 50%;
            width: 54px;
            height: 54px;
            font-size: 32px;
            margin-left: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #a5651e;
            transition: 0.05s linear;
            vertical-align: middle;
        }
        .speaker-icon:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a5651e;
        }

        .word-slots {
            background: #d9f0fc;
            border-radius: 48px;
            padding: 20px 15px;
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            min-height: 100px;
            align-items: center;
        }

        .slot {
            background: #fff5e6;
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 52px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 28px;
            box-shadow: 0 5px 0 #bb994c;
            color: #5a3e1b;
            text-transform: lowercase;
            transition: all 0.1s ease;
            position: relative;
        }

        .slot.empty {
            background: #f4e5cd;
            box-shadow: inset 0 0 0 3px #ffe0a3, 0 3px 0 #bb994c;
            color: #d6b575;
            font-size: 36px;
        }

        .slot.filled {
            background: #b7e0a0;
            color: #2a6b1f;
            box-shadow: 0 5px 0 #6f9a45;
        }

        .letters-pool {
            background: #b0def0;
            border-radius: 50px;
            padding: 25px 15px;
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            min-height: 150px;
        }

        .letter-card {
            background: #ffcf7a;
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
            color: #3e2a1f;
            border-radius: 50%;
            box-shadow: 0 8px 0 #b47c2e;
            cursor: pointer;
            transition: 0.05s linear;
            text-transform: lowercase;
            background: radial-gradient(circle at 30% 30%, #ffe2a4, #ffc567);
        }

        .letter-card:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b47c2e;
        }

        .wrong-shake {
            animation: shakeFish 0.2s ease-in-out 0s 2;
            background-color: #ff8a7a !important;
        }

        @keyframes shakeFish {
            0% { transform: translateX(0px) rotate(0deg);}
            25% { transform: translateX(-7px) rotate(-5deg);}
            75% { transform: translateX(7px) rotate(5deg);}
            100% { transform: translateX(0px) rotate(0deg);}
        }

        .pacman-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }
        .pacman {
            position: absolute;
            width: 70px;
            height: 70px;
            z-index: 1001;
            pointer-events: none;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.3));
        }
        @keyframes chomp {
            0% { clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 100% 100%, 0% 100%, 0% 50%); }
            50% { clip-path: polygon(0% 0%, 100% 0%, 70% 50%, 100% 100%, 0% 100%, 30% 50%); }
            100% { clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 100% 100%, 0% 100%, 0% 50%); }
        }
        .pacman-body {
            width: 100%;
            height: 100%;
            background-color: #ffde34;
            border-radius: 50%;
            animation: chomp 0.2s steps(2, start) infinite;
            box-shadow: 0 0 0 2px #ffb347, 0 0 0 5px #f5a623;
        }
        .eaten-letter {
            position: absolute;
            font-size: 52px;
            font-weight: bold;
            font-family: monospace;
            background: transparent;
            text-shadow: 0 0 5px gold;
            pointer-events: none;
            z-index: 1002;
            transition: all 0.2s ease;
        }
        .feedback {
            background: #ffb347;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
            color: #fff5e0;
            text-shadow: 2px 2px 0 #b95f1a;
            margin-top: 10px;
        }
        .control-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button {
            background: #ffbb77;
            border: none;
            font-size: 20px;
            font-weight: bold;
            font-family: inherit;
            padding: 10px 20px;
            border-radius: 60px;
            color: #3e2a1f;
            cursor: pointer;
            box-shadow: 0 5px 0 #a5651e;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a5651e;
        }
        .admin-panel {
            background: #eeddbb;
            border-radius: 48px;
            padding: 15px 20px;
            margin-top: 25px;
            border: 2px dashed #ffb347;
        }
        .word-input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 15px;
        }
        .word-input-group input, .word-input-group select {
            padding: 10px 14px;
            font-size: 18px;
            border-radius: 60px;
            border: 1px solid #cb9c5a;
            background: #fff7e8;
        }
        .word-list {
            background: #fff2df;
            padding: 12px;
            border-radius: 28px;
            font-size: 16px;
            max-height: 100px;
            overflow-y: auto;
        }
        .bgm-control {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #f1cf8c;
            border-radius: 60px;
            padding: 5px 12px;
            margin-left: 12px;
        }
        .voice-hint {
            background: #ffecb3;
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 14px;
            color: #b95f1a;
            display: inline-block;
            margin-left: 10px;
        }
        .unit-badge {
            background: #ffc489;
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 0.9rem;
            margin-left: 12px;
            color: #4a2a0a;
        }
        .home-btn {
            background: #8bc34a;
            box-shadow: 0 5px 0 #5a8f2c;
            margin-left: 10px;
        }
        .home-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #5a8f2c;
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
            overflow: hidden;
        }
        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffcc00;
            opacity: 0.8;
            animation: confettiFall 1.2s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .encouragement {
            position: fixed;
            left: 50%;
            top: 30%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #ffdd77, #ffaa33);
            color: #fff;
            font-size: 3.2rem;
            font-weight: bold;
            padding: 20px 40px;
            border-radius: 80px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,200,0.8);
            text-shadow: 4px 4px 0 #b45f1b;
            z-index: 2100;
            white-space: nowrap;
            font-family: inherit;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(2px);
            border: 3px solid #ffecb3;
            animation: floatUpFade 1.5s ease-out forwards;
            pointer-events: none;
        }
        @keyframes floatUpFade {
            0% { opacity: 0; transform: translate(-50%, 20%) scale(0.7); }
            20% { opacity: 1; transform: translate(-50%, -30%) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -70%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(0.8); visibility: hidden; }
        }

        @media (max-width: 600px) {
            .slot, .letter-card { width: 60px; height: 60px; font-size: 36px; }
            .chinese-meaning { font-size: 28px; }
            .feedback { font-size: 18px; }
            .fish-emoji { font-size: 60px; }
            .pacman { width: 50px; height: 50px; }
            .speaker-icon { width: 42px; height: 42px; font-size: 26px; }
            .fish-badge { font-size: 28px; }
            .encouragement { font-size: 2rem; padding: 12px 28px; white-space: nowrap; }
            .unit-btn { font-size: 1.3rem; padding: 12px 20px; min-width: 140px; }
        }
    </style>
</head>
<body>

<!-- 开始选择界面 -->
<div id="startOverlay" class="start-overlay">
    <div class="start-panel">
        <h1>🐟 Pac-Man 吃单词 🟡</h1>
        <p>✨ 选择要挑战的单元 ✨</p>
        <div class="unit-buttons">
            <button class="unit-btn mon-fri" data-unit="monfri">📘 周一 & 周五</button>
            <button class="unit-btn thu" data-unit="thu">📗 周四单元</button>
        </div>
    </div>
</div>

<div class="game-container" id="gameContainer" style="display: none;">
    <div class="score-area">
        <div class="score-title">
            🐟 收集小鱼积分
            <span class="score-counter" id="completedWordsCount">0</span>
            <span>/</span>
            <span id="nextMilestone">10</span>
            <span class="unit-badge" id="currentUnitBadge">📘 周一&周五</span>
            <button id="homeBtn" class="home-btn">🏠 主菜单</button>
        </div>
        <div class="fish-collection" id="fishCollection"></div>
    </div>

    <div class="monster-area">
        <div class="fish-emoji" id="fishCharacter">🐟✨</div>
        <div class="hint-area">
            <div style="display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap;">
                <div class="chinese-meaning" id="chineseMeaning">猫</div>
                <div class="speaker-icon" id="speakWordBtn">🔊</div>
            </div>
            <div class="word-slots" id="wordSlotsContainer"></div>
        </div>
    </div>

    <div class="letters-pool" id="lettersPool"></div>
    <div class="feedback" id="feedbackMsg">🐠 按顺序点击小鱼泡泡，Pac-Man 会来吃掉字母！</div>

    <div class="control-bar">
        <button id="resetBtn">🔄 重新挑战</button>
        <button id="nextWordBtn">🌟 下一个单词</button>
        <button id="speakAgainBtn">🔊 再读一遍</button>
        <div class="bgm-control">
            <span>🎵</span>
            <button id="bgmToggleBtn" style="background:#f0bc6e; padding:5px 12px; font-size:16px;">🔊 开</button>
        </div>
    </div>

    <div class="admin-panel">
        <div class="admin-title">
            📚 当前单词库 · 每完成10个词获得一条小鱼 🐟
            <span class="current-word-badge" id="wordCountBadge">0个词</span>
            <span class="voice-hint" id="voiceHint">🎤 点击喇叭或按钮激活语音</span>
        </div>
        <div class="word-input-group">
            <input type="text" id="newWordInput" placeholder="英文, 例: goat" maxlength="12">
            <input type="text" id="newChineseInput" placeholder="中文, 例: 山羊" maxlength="10">
            <input type="text" id="newEmojiInput" placeholder="图标, 例: 🐐" maxlength="6">
            <button id="addWordBtn">➕ 添加单词</button>
            <select id="wordSelect"></select>
            <button id="deleteWordBtn">🗑️ 删除</button>
        </div>
        <div class="word-list" id="wordListPreview"></div>
    </div>
</div>

<script>
    (function(){
        // ---------- 内置单词库 ----------
        const MONFRI_WORDS = [

        // 随机打乱数组 (Fisher-Yates)
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // 获取随机顺序的单词库副本
        function getShuffledWordList(unit) {
            const source = unit === "monfri" ? MONFRI_WORDS : THU_WORDS;
            const copy = JSON.parse(JSON.stringify(source));
            return shuffleArray(copy);
        }

        function speakEncouragement(text) {
            if (!synth || !speechEnabled) return;
            try {
                synth.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 1.0;
                utterance.pitch = 1.2;
                const voice = getEnglishVoice();
                if (voice) utterance.voice = voice;
                synth.speak(utterance);
            } catch(e) {}
        }

            const div = document.createElement('div');

            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1500);
            speakEncouragement(item.speech);

        function getEnglishVoice() {
            if (!synth) return null;
            const voices = synth.getVoices();
            let voice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google'));
            if (!voice) voice = voices.find(v => v.lang === 'en-US');
            return voice || (voices.length ? voices[0] : null);
        }
        
        function speakWordDirect(word) {
            if (!synth) return false;
            try {
                synth.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.85;
                utterance.pitch = 1.1;
                const voice = getEnglishVoice();
                if (voice) utterance.voice = voice;
                utterance.onstart = () => { voiceHint.innerText = "🔊 朗读中..."; };
                utterance.onend = () => { voiceHint.innerText = "✅ 语音就绪"; };
                synth.speak(utterance);
                return true;
            } catch(e) { return false; }
        }
        
		// 新增：等待语音引擎加载完成的辅助函数
		function waitForVoices() {
			return new Promise((resolve) => {
				if (synth.getVoices().length > 0) {
					resolve();
				} else {
					synth.onvoiceschanged = () => {
						resolve();
					};
				}
			});
		}

		// 修复后的 enableSpeech()
		async function enableSpeech() {
			if (speechEnabled) return true;
			if (!synth) { voiceHint.innerText = "❌ 不支持"; return false; }
			
			try {
				// ✅ 修复1：等待语音引擎加载完成
				await waitForVoices();
				
				// ✅ 修复2：使用真正有声音的测试语句，而不是空字符串
				const testUtterance = new SpeechSynthesisUtterance('test');
				testUtterance.volume = 0;  // 静音测试，用户听不到
				testUtterance.rate = 0.1;
				
				testUtterance.onend = () => {
					speechEnabled = true;
					voiceHint.innerText = "🎤 语音已激活！";
					voiceHint.style.background = "#c8e6b5";
					feedbackMsgSpan.innerHTML = "✅ 语音已激活！点击喇叭可听发音";
					if (pendingWord) { speakWordDirect(pendingWord); pendingWord = null; }
					else if (currentWordObj) speakWordDirect(currentWordObj.word);
				};
				
				// ✅ 修复3：不要立即 cancel，让 onend 正常触发
				synth.speak(testUtterance);
				return true;
			} catch(e) {
				console.warn("语音激活失败", e);
				speechEnabled = true;  // 降级处理，仍允许点击
				return true;
			}
		}

            feedbackMsgSpan.innerHTML = "🐠 按顺序点击小写字母泡泡，完成单词获得积分！";
            setTimeout(() => { if(speechEnabled) speakCurrentWord(); else pendingWord = currentWordObj.word; }, 300);
        }
        
        function renderSlotsAndLetters() {
            wordSlotsContainer.innerHTML = '';
            for(let i=0;i<currentSlots.length;i++){
                let div = document.createElement('div');
                div.classList.add('slot');
                if(currentSlots[i]===null){ div.classList.add('empty'); div.innerText = '___'; }
                else { div.classList.add('filled'); div.innerText = currentSlots[i]; }
                wordSlotsContainer.appendChild(div);
            }
            lettersPoolDiv.innerHTML = '';
            availableLetters.filter(l=>!l.used).forEach(item => {
                let card = document.createElement('div');
                card.classList.add('letter-card');
                card.innerText = item.letter;
                card.dataset.id = item.id;
                card.addEventListener('click', (e) => { if(canInteract && window.gameInteract) handleLetterClick(item.id); });
                lettersPoolDiv.appendChild(card);
            });
        }
        
        function animatePacmanEat(wordLetters, slotElements, onComplete) {
            window.gameInteract = false;
            const overlay = document.createElement('div');
            overlay.className = 'pacman-overlay';
            document.body.appendChild(overlay);
            let idx = 0;
            const firstRect = slotElements[0]?.getBoundingClientRect();
            const startY = firstRect ? (firstRect.top + firstRect.height/2 - 35) : (window.innerHeight/2);
            const pacmanDiv = document.createElement('div');
            pacmanDiv.className = 'pacman';
            pacmanDiv.style.position = 'absolute';
            pacmanDiv.style.left = '-80px';
            pacmanDiv.style.top = `${startY}px`;
            pacmanDiv.style.transition = 'left 0.35s ease-out';
            pacmanDiv.appendChild(document.createElement('div')).className = 'pacman-body';
            overlay.appendChild(pacmanDiv);
            function eatNext() {
                if (idx >= wordLetters.length) {
                    pacmanDiv.style.transform = 'scale(1.3)';
                    setTimeout(() => { overlay.remove(); if(onComplete) onComplete(); window.gameInteract = true; }, 500);
                    return;
                }
                const rect = slotElements[idx].getBoundingClientRect();
                pacmanDiv.style.left = `${rect.left + rect.width/2 - 35}px`;
                pacmanDiv.style.top = `${rect.top + rect.height/2 - 35}px`;
                const letterSpan = document.createElement('div');
                letterSpan.className = 'eaten-letter';
                letterSpan.innerText = wordLetters[idx];
                letterSpan.style.left = `${rect.left + rect.width/2 - 25}px`;
                letterSpan.style.top = `${rect.top + rect.height/2 - 35}px`;
                overlay.appendChild(letterSpan);
                setTimeout(() => {
                    letterSpan.style.transform = 'scale(0.1)';
                    letterSpan.style.opacity = '0';
                    if(slotElements[idx]) { slotElements[idx].classList.add('empty'); slotElements[idx].classList.remove('filled'); slotElements[idx].innerText = '___'; }
                    setTimeout(() => { letterSpan.remove(); idx++; eatNext(); }, 120);
                }, 180);
            }
            setTimeout(eatNext, 100);
        }
        
		async function handleLetterClick(letterId) {
			if(!canInteract || !window.gameInteract) return;
			const letterObj = availableLetters.find(l=>l.id===letterId);
			if(!letterObj || letterObj.used) return;
			const firstEmpty = currentSlots.findIndex(s=>s===null);
			if(firstEmpty === -1) return;
			const required = targetLetters[firstEmpty];
			if(letterObj.letter === required){
				letterObj.used = true;
				currentSlots[firstEmpty] = letterObj.letter;
				renderSlotsAndLetters();
				if(currentSlots.every(s=>s!==null)){
					canInteract = false;
					feedbackMsgSpan.innerHTML = "🎉 单词拼写正确！ 现在读出单词... 🎉";
					
					// 先读出当前单词
					if(speechEnabled) {
						speakWordDirect(currentWordObj.word);
					} else {
						pendingWord = currentWordObj.word;
						enableSpeech();
					}
					
					// 等待单词读完之后再开始吃字母动画
					// 估算朗读时间：单词长度 * 0.3秒 + 0.8秒缓冲
					const wordLength = currentWordObj.word.length;
					const readTime = Math.max(1500, wordLength * 300 + 800);
					
					setTimeout(() => {
						const slotsDom = document.querySelectorAll('.slot');
						animatePacmanEat([...currentSlots], slotsDom, () => {
							onWordCompletedAndCelebrate();
							autoTimeout = setTimeout(() => { goToNextWord(); }, 1000);
						});
					}, readTime);
				}
			} else {
				const wrongCard = document.querySelector(`.letter-card[data-id='${letterId}']`);
				if(wrongCard) wrongCard.classList.add('wrong-shake');
				setTimeout(()=> wrongCard?.classList.remove('wrong-shake'), 300);
				feedbackMsgSpan.innerHTML = `❌ 顺序不对，应该先点第${firstEmpty+1}个字母 “${required}”～`;
			}
		}
        
        function goToNextWord() {
            if(autoTimeout) clearTimeout(autoTimeout);
            if(wordLibrary.length === 0) return;
            currentWordIndex = (currentWordIndex + 1) % wordLibrary.length;
            resetGame();
        }
        
        function resetSameWord() { if(autoTimeout) clearTimeout(autoTimeout); resetGame(); }
        
        // 返回主菜单
        function returnToHome() {
            if(autoTimeout) clearTimeout(autoTimeout);
            gameContainer.style.display = "none";
            startOverlay.style.display = "flex";
            // 停止BGM
            if(audioCtx) {
                bgmActive = false;
                audioCtx.close();
                audioCtx = null;
            }
            bgmToggleBtn.innerHTML = '🔊 开';
        }
        
        // 初始化单元，随机顺序
        function initGameWithUnit(unit) {
            currentUnit = unit;
            // 获取随机顺序的单词库
            wordLibrary = getShuffledWordList(unit);
            currentWordIndex = 0;
            totalCompletedWords = 0;
            updateScoreUI();
            updateUIlist();
            resetGame();
            gameContainer.style.display = "block";
            startOverlay.style.display = "none";
            // 激活语音和音乐
            setTimeout(() => onUserActivation(), 500);
            // 启动BGM（如果没启动）
            if(!audioCtx) startBackgroundMusic();
        }
        
        function updateUIlist() {
            wordSelect.innerHTML = '';
            wordLibrary.forEach((w,idx)=>{ let opt=document.createElement('option'); opt.value=idx; opt.textContent=`${w.word} (${w.chinese}) ${w.emoji}`; wordSelect.appendChild(opt); });
            wordCountBadge.innerText = `${wordLibrary.length}个词`;
            let preview = "📖 单词库: ";
            wordLibrary.slice(0,12).forEach(w=> preview+=`${w.word} `);
            if(wordLibrary.length>12) preview+="...";
            wordListPreview.innerText = preview;
            currentUnitBadge.innerText = currentUnit === "monfri" ? "📘 周一&周五" : "📗 周四单元";
        }
        
        function addWord() {
            let eng = newWordInput.value.trim().toLowerCase();
            let chn = newChineseInput.value.trim();
            let icon = newEmojiInput.value.trim();
            if(!eng || !/^[a-z ]+$/.test(eng)){ feedbackMsgSpan.innerHTML="⚠️ 有效英文"; return; }
            if(!chn) chn=eng;
            if(!icon) icon="📖";
            wordLibrary.push({word:eng, chinese:chn, emoji:icon});
            updateUIlist();
            if(currentWordIndex>=wordLibrary.length) currentWordIndex=0;
            resetGame();
            newWordInput.value=""; newChineseInput.value=""; newEmojiInput.value="";
            feedbackMsgSpan.innerHTML=`✅ 添加 ${eng}`;
        }
        function deleteWord() {
            if(wordLibrary.length<=1){ feedbackMsgSpan.innerHTML="⚠️ 至少留一个词"; return; }
            let idx = parseInt(wordSelect.value,10);
            if(isNaN(idx)) return;
            wordLibrary.splice(idx,1);
            if(currentWordIndex>=wordLibrary.length) currentWordIndex=wordLibrary.length-1;
            updateUIlist();
            resetGame();
        }
        
        // BGM
        let bgmActive = true, melodyIndex = 0, audioCtx = null;
        const notesMap = { 'C4':261.63, 'D4':293.66, 'E4':329.63, 'G4':392.00, 'A4':440.00 };
        const melodySeq = [{ note: 'C4', dur: 1 }, { note: 'E4', dur: 1 }, { note: 'G4', dur: 1 }, { note: 'A4', dur: 2 }];
        function playNote(freq, dur, vol=0.06) { if(!bgmActive||!audioCtx) return; try{ const osc=audioCtx.createOscillator(), gain=audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.value=freq; gain.gain.value=vol; osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur); osc.stop(audioCtx.currentTime+dur); } catch(e){} }
        function playBgmLoop() { if(!bgmActive||!audioCtx) return; const seg=melodySeq[melodyIndex%melodySeq.length]; playNote(notesMap[seg.note], seg.dur*0.4); melodyIndex++; setTimeout(playBgmLoop, seg.dur*400); }
        function startBackgroundMusic() { if(audioCtx) return; try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); bgmActive=true; melodyIndex=0; playBgmLoop(); } catch(e){} }
        function toggleBgm() { if(bgmActive){ bgmActive=false; if(audioCtx){ audioCtx.close(); audioCtx=null; } bgmToggleBtn.innerHTML='🔇 关'; } else { startBackgroundMusic(); bgmToggleBtn.innerHTML='🔊 开'; } }
        
        function bindEvents() {
            resetBtn.addEventListener('click', resetSameWord);
            nextWordBtn.addEventListener('click', () => { if(autoTimeout)clearTimeout(autoTimeout); goToNextWord(); });
            addWordBtn.addEventListener('click', addWord);
            deleteWordBtn.addEventListener('click', deleteWord);
            bgmToggleBtn.addEventListener('click', toggleBgm);
            speakWordBtn.addEventListener('click', speakCurrentWord);
            speakAgainBtn.addEventListener('click', speakCurrentWord);
            homeBtn.addEventListener('click', returnToHome);
            [resetBtn, nextWordBtn, speakAgainBtn, addWordBtn, deleteWordBtn, bgmToggleBtn, speakWordBtn, homeBtn].forEach(btn => btn?.addEventListener('click', onUserActivation));
            document.body.addEventListener('click', onUserActivation);
        }
        
        document.querySelectorAll('.unit-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const unit = e.currentTarget.dataset.unit;
                initGameWithUnit(unit);
                startBackgroundMusic();
            });
        });
        
        bindEvents();
		// ✅ 修复后：更完整的初始化
		if(synth) {
			// 立即获取一次
			synth.getVoices();
			synth.onvoiceschanged = () => {
				synth.getVoices();
				voiceHint.innerText = "🎤 语音引擎已就绪";
			};
			// 如果已经加载完成，直接提示
			if(synth.getVoices().length > 0) {
				voiceHint.innerText = "🎤 语音引擎已就绪";
			}
		}
    })();
</script>
</body>
